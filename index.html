<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progmize Software Systems</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            <img src="Logo.PNG" alt="Progmize Logo">
        </div>

        <nav>
            <a href="#about">About</a>
        </nav>

    </header>


    <!-- Hero Section -->

    <section class="hero" id="about">

        <div class="hero-content">

            <h4>PROGMIZE SOFTWARE SYSTEMS</h4>

            <h1>
                Building Smart Digital Solutions
            </h1>

            <p>
                Progmize Software Systems provides innovative software
                development, quality assurance, web applications,
                mobile applications and digital transformation
                solutions that help businesses grow efficiently.
            </p>

            <button id="teamBtn">
                Meet Our Team
            </button>

        </div>

    </section>


    <!-- Team Section -->

    <section class="team-section" id="team">

        <div class="team-card">

            <img id="employeeImage" src="CEO.jpeg" alt="Employee">

            <h2 id="employeeName">
                CEO
            </h2>

            <p id="employeeRole">
                Chief Executive Officer
            </p>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
