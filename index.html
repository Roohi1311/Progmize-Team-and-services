<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progmize Software Systems</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Progmize Demo</div>

    <nav>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#team">Team</a>
    </nav>
</header>

<section class="hero">

    <div class="hero-text">
        <h1>Welcome to Progmize</h1>

        <p>
            Building modern software solutions with innovation,
            quality and teamwork.
        </p>

        <button id="teamBtn">
            Meet Our Team
        </button>
    </div>

    <div class="hero-image">
        <img src="logo.png" alt="Logo">
    </div>

</section>

<section id="services">

    <h2>Our Services</h2>

    <div class="cards">

        <div class="card">
            Web Development
        </div>

        <div class="card">
            Mobile Apps
        </div>

        <div class="card">
            UI/UX Design
        </div>

        <div class="card">
            QA Testing
        </div>

    </div>

</section>

<section id="team">

    <h2>Our Team</h2>

    <div id="teamContainer"></div>

</section>

<script src="script.js"></script>

</body>

<script src="script.js"></script>

</html>
